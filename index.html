<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYROX Life — Login</title>
<link rel="stylesheet" href="style.css">
<style>
  body { padding-bottom: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  body::before, body::after { content: ''; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 30% 20%, rgba(240,192,64,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 70% 80%, rgba(64,200,240,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .auth-wrap { width: 100%; max-width: 420px; padding: 24px 20px; position: relative; z-index: 1; }
  .auth-logo { text-align: center; margin-bottom: 40px; }
  .auth-logo h1 { font-family: var(--font-d); font-size: 56px; letter-spacing: 6px; line-height: 1; }
  .auth-logo h1 span { color: var(--accent); }
  .auth-logo p { font-family: var(--font-m); font-size: 11px; color: var(--muted); letter-spacing: 3px; margin-top: 8px; }
  .auth-tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; font-family: var(--font-d); font-size: 16px; letter-spacing: 2px; color: var(--muted); cursor: pointer; border-radius: 7px; transition: all 0.2s; }
  .auth-tab.active { background: var(--card2); color: var(--accent); }
  .auth-form { display: none; animation: fadeUp 0.3s ease both; }
  .auth-form.active { display: block; }
  .auth-divider { text-align: center; font-family: var(--font-m); font-size: 10px; color: var(--muted); margin: 16px 0; letter-spacing: 2px; }
  .tagline { text-align: center; margin-top: 32px; }
  .tagline p { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.6; }
  .tagline strong { color: var(--accent); font-style: normal; }
  .error-msg { font-family: var(--font-m); font-size: 11px; color: var(--accent3); margin-top: 8px; display: none; letter-spacing: 1px; }
  .weight-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo anim-up">
    <h1><span>HYROX</span><br>LIFE</h1>
    <p>MAKE IT A LIFESTYLE</p>
  </div>

  <div class="auth-tabs anim-up-1">
    <div class="auth-tab active" onclick="switchTab('login')">LOGIN</div>
    <div class="auth-tab" onclick="switchTab('register')">REGISTER</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="auth-form active" id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn btn-primary" onclick="handleLogin()" id="login-btn">LOGIN</button>
  </div>

  <!-- REGISTER FORM -->
  <div class="auth-form" id="form-register">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="reg-name" placeholder="e.g. Rahman" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <div class="weight-row">
      <div class="form-group">
        <label>Current Weight (kg)</label>
        <input type="number" id="reg-current" placeholder="e.g. 120" min="30" max="300" step="0.1">
      </div>
      <div class="form-group">
        <label>Target Weight (kg)</label>
        <input type="number" id="reg-goal" placeholder="e.g. 80" min="30" max="300" step="0.1">
      </div>
    </div>
    <div class="error-msg" id="reg-error"></div>
    <button class="btn btn-primary" onclick="handleRegister()" id="reg-btn">CREATE ACCOUNT</button>
  </div>

  <div class="tagline anim-up-3">
    <p>Not a goal. Not a deadline.<br><strong>A habit you build for life.</strong></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  // Check already logged in
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session) window.location.href = 'home.html';
  })();

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError(id) {
    document.getElementById(id).style.display = 'none';
  }

  async function handleLogin() {
    hideError('login-error');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showError('login-error', 'Please fill in all fields');

    const btn = document.getElementById('login-btn');
    btn.textContent = 'LOGGING IN...';
    btn.disabled = true;

    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) {
      showError('login-error', error.message);
      btn.textContent = 'LOGIN';
      btn.disabled = false;
    } else {
      window.location.href = 'home.html';
    }
  }

  async function handleRegister() {
    hideError('reg-error');
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const current = parseFloat(document.getElementById('reg-current').value);
    const goal = parseFloat(document.getElementById('reg-goal').value);

    if (!name || !email || !password || !current || !goal)
      return showError('reg-error', 'Please fill in all fields');
    if (password.length < 6)
      return showError('reg-error', 'Password must be at least 6 characters');
    if (goal >= current)
      return showError('reg-error', 'Target weight should be less than current weight');

    const btn = document.getElementById('reg-btn');
    btn.textContent = 'CREATING...';
    btn.disabled = true;

    const { data, error } = await db.auth.signUp({
      email,
      password,
      options: {
        data: { name, starting_weight: current, goal_weight: goal }
      }
    });
    if (error) {
      showError('reg-error', error.message);
      btn.textContent = 'CREATE ACCOUNT';
      btn.disabled = false;
      return;
    }

    // Email confirmation required — profile will be created automatically after confirmation
    if (!data.session) {
      showError('reg-error', 'Account created! Check your email and click the confirmation link to log in.');
      btn.textContent = 'CHECK YOUR EMAIL';
      // leave button disabled so they don't re-submit
      return;
    }

    window.location.href = 'home.html';
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('form-login').classList.contains('active');
      loginActive ? handleLogin() : handleRegister();
    }
  });
</script>
</body>
</html>
